services:
  - type: web
    name: internpilot-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_MODE
        value: demo
      - key: PYTHON_VERSION
        value: 3.12.0

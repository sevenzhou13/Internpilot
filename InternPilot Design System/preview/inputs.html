<!-- InternPilot: Form Inputs -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #fff; padding: 20px 24px; font-family: var(--font-body); }
.section { margin-bottom: 16px; }
.label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
.field { margin-bottom: 12px; }
.field-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
.input-focus { border-color: var(--color-primary-500); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
.input-error { border-color: var(--color-danger-500); }
.helper { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.error-msg { font-size: 11px; color: var(--color-danger-600); margin-top: 4px; }
select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%236B7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; cursor: pointer; }
textarea { resize: vertical; min-height: 70px; }
</style>
</head>
<body>
<div class="field">
  <div class="field-label">岗位名称</div>
  <input class="input" type="text" placeholder="例：数据分析实习生">
  <div class="helper">输入你感兴趣的岗位类型</div>
</div>
<div class="field">
  <div class="field-label">城市偏好（Focus State）</div>
  <input class="input input-focus" type="text" value="上海">
</div>
<div class="field">
  <div class="field-label">岗位类型</div>
  <select class="input">
    <option>数据分析</option>
    <option>AI 产品经理</option>
    <option>用户研究</option>
  </select>
</div>
<div class="field">
  <div class="field-label">经历描述（Error State）</div>
  <input class="input input-error" type="text" value="">
  <div class="error-msg">请填写经历描述，至少 20 字</div>
</div>
<div class="field">
  <div class="field-label">详细描述</div>
  <textarea class="input" placeholder="描述你在这段经历中做了什么，取得了什么成果..."></textarea>
</div>
</body>
</html>

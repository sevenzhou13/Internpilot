<!-- InternPilot: Primary & Accent Color Swatches -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: var(--bg-page); padding: 20px; font-family: var(--font-body); }
.row { display: flex; gap: 6px; margin-bottom: 12px; }
.swatch { flex: 1; height: 48px; border-radius: 8px; display: flex; align-items: flex-end; padding: 5px 7px; }
.swatch span { font-size: 10px; font-weight: 500; font-family: var(--font-mono); }
.label { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="label">Primary — Indigo</div>
<div class="row">
  <div class="swatch" style="background:#EEF2FF"><span style="color:#6366F1">50</span></div>
  <div class="swatch" style="background:#E0E7FF"><span style="color:#6366F1">100</span></div>
  <div class="swatch" style="background:#C7D2FE"><span style="color:#4F46E5">200</span></div>
  <div class="swatch" style="background:#A5B4FC"><span style="color:#4338CA">300</span></div>
  <div class="swatch" style="background:#818CF8"><span style="color:#fff">400</span></div>
  <div class="swatch" style="background:#6366F1"><span style="color:#fff">500</span></div>
  <div class="swatch" style="background:#4F46E5"><span style="color:#fff">600</span></div>
  <div class="swatch" style="background:#4338CA"><span style="color:#fff">700</span></div>
  <div class="swatch" style="background:#3730A3"><span style="color:#fff">800</span></div>
  <div class="swatch" style="background:#312E81"><span style="color:#fff">900</span></div>
</div>
<div class="label">Accent — Violet</div>
<div class="row">
  <div class="swatch" style="background:#F5F3FF"><span style="color:#7C3AED">50</span></div>
  <div class="swatch" style="background:#EDE9FE"><span style="color:#7C3AED">100</span></div>
  <div class="swatch" style="background:#DDD6FE"><span style="color:#6D28D9">200</span></div>
  <div class="swatch" style="background:#C4B5FD"><span style="color:#6D28D9">300</span></div>
  <div class="swatch" style="background:#A78BFA"><span style="color:#fff">400</span></div>
  <div class="swatch" style="background:#8B5CF6"><span style="color:#fff">500</span></div>
  <div class="swatch" style="background:#7C3AED"><span style="color:#fff">600</span></div>
  <div class="swatch" style="background:#6D28D9"><span style="color:#fff">700</span></div>
</div>
</body>
</html>

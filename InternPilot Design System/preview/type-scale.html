<!-- InternPilot: Type Scale -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #fff; padding: 20px 24px; font-family: var(--font-body); }
.row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-default); }
.row:last-child { border-bottom: none; }
.meta { width: 80px; flex-shrink: 0; font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); }
.specimen { color: var(--text-primary); }
</style>
</head>
<body>
<div class="row">
  <div class="meta">5xl / 36px</div>
  <div class="specimen" style="font-family:var(--font-display);font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.2">InternPilot</div>
</div>
<div class="row">
  <div class="meta">4xl / 30px</div>
  <div class="specimen" style="font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1.2">Dashboard</div>
</div>
<div class="row">
  <div class="meta">3xl / 24px</div>
  <div class="specimen" style="font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1.35">岗位推荐</div>
</div>
<div class="row">
  <div class="meta">xl / 18px</div>
  <div class="specimen" style="font-family:var(--font-display);font-size:18px;font-weight:600;line-height:1.35">小红书 · 数据分析实习生</div>
</div>
<div class="row">
  <div class="meta">lg / 16px</div>
  <div class="specimen" style="font-size:16px;font-weight:500;line-height:1.5">Section heading / Card title</div>
</div>
<div class="row">
  <div class="meta">base / 14px</div>
  <div class="specimen" style="font-size:14px;line-height:1.5">Body text — 根据你的经历，我们推荐了 12 个高匹配岗位，赶快查看吧。</div>
</div>
<div class="row">
  <div class="meta">sm / 13px</div>
  <div class="specimen" style="font-size:13px;color:var(--text-secondary);line-height:1.5">Label / Secondary — 上海 · 3–6 个月 · 500–800 元/天</div>
</div>
<div class="row">
  <div class="meta">xs / 11px</div>
  <div class="specimen" style="font-size:11px;color:var(--text-muted);letter-spacing:0.04em;line-height:1.4">CAPTION · METADATA · STATUS</div>
</div>
</body>
</html>

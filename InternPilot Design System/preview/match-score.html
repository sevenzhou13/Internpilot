<!-- InternPilot: Match Score Component -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: var(--bg-page); padding: 20px 24px; font-family: var(--font-body); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.score-card { background: #fff; border: 1px solid var(--border-default); border-radius: 12px; padding: 16px; box-shadow: var(--shadow-sm); }
.score-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.company { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.role { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-top: 1px; }
.score-ring { text-align: center; margin: 4px 0 10px; }
.score-num { font-family: var(--font-display); font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
.score-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.breakdown { display: flex; flex-direction: column; gap: 5px; }
.dim { display: flex; align-items: center; gap: 6px; }
.dim-name { font-size: 10px; color: var(--text-secondary); width: 52px; flex-shrink: 0; }
.dim-bar { flex: 1; height: 4px; background: var(--color-gray-100); border-radius: 9999px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 9999px; }
.dim-val { font-size: 10px; font-weight: 600; color: var(--text-secondary); width: 24px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>
<div class="grid">
  <!-- 88% high match -->
  <div class="score-card">
    <div class="score-header">
      <div><div class="company">小红书</div><div class="role">数据分析实习生</div></div>
      <span class="badge badge-success">强推荐</span>
    </div>
    <div class="score-ring">
      <div class="score-num" style="color:var(--color-success-500)">88</div>
      <div class="score-label">匹配度 %</div>
    </div>
    <div class="breakdown">
      <div class="dim"><span class="dim-name">技能</span><div class="dim-bar"><div class="dim-fill" style="width:92%;background:var(--color-success-500)"></div></div><span class="dim-val">92</span></div>
      <div class="dim"><span class="dim-name">经历</span><div class="dim-bar"><div class="dim-fill" style="width:88%;background:var(--color-success-500)"></div></div><span class="dim-val">88</span></div>
      <div class="dim"><span class="dim-name">学历</span><div class="dim-bar"><div class="dim-fill" style="width:85%;background:var(--color-success-400)"></div></div><span class="dim-val">85</span></div>
      <div class="dim"><span class="dim-name">关键词</span><div class="dim-bar"><div class="dim-fill" style="width:80%;background:var(--color-success-400)"></div></div><span class="dim-val">80</span></div>
    </div>
  </div>
  <!-- 84% -->
  <div class="score-card">
    <div class="score-header">
      <div><div class="company">字节跳动</div><div class="role">AI 产品实习生</div></div>
      <span class="badge badge-success">强推荐</span>
    </div>
    <div class="score-ring">
      <div class="score-num" style="color:var(--color-success-500)">84</div>
      <div class="score-label">匹配度 %</div>
    </div>
    <div class="breakdown">
      <div class="dim"><span class="dim-name">技能</span><div class="dim-bar"><div class="dim-fill" style="width:80%;background:var(--color-success-500)"></div></div><span class="dim-val">80</span></div>
      <div class="dim"><span class="dim-name">经历</span><div class="dim-bar"><div class="dim-fill" style="width:88%;background:var(--color-success-500)"></div></div><span class="dim-val">88</span></div>
      <div class="dim"><span class="dim-name">学历</span><div class="dim-bar"><div class="dim-fill" style="width:90%;background:var(--color-success-400)"></div></div><span class="dim-val">90</span></div>
      <div class="dim"><span class="dim-name">关键词</span><div class="dim-bar"><div class="dim-fill" style="width:76%;background:var(--color-warning-500)"></div></div><span class="dim-val">76</span></div>
    </div>
  </div>
  <!-- 79% -->
  <div class="score-card">
    <div class="score-header">
      <div><div class="company">腾讯</div><div class="role">用户研究实习生</div></div>
      <span class="badge badge-warning">推荐</span>
    </div>
    <div class="score-ring">
      <div class="score-num" style="color:var(--color-warning-500)">79</div>
      <div class="score-label">匹配度 %</div>
    </div>
    <div class="breakdown">
      <div class="dim"><span class="dim-name">技能</span><div class="dim-bar"><div class="dim-fill" style="width:72%;background:var(--color-warning-500)"></div></div><span class="dim-val">72</span></div>
      <div class="dim"><span class="dim-name">经历</span><div class="dim-bar"><div class="dim-fill" style="width:85%;background:var(--color-success-500)"></div></div><span class="dim-val">85</span></div>
      <div class="dim"><span class="dim-name">学历</span><div class="dim-bar"><div class="dim-fill" style="width:80%;background:var(--color-success-400)"></div></div><span class="dim-val">80</span></div>
      <div class="dim"><span class="dim-name">关键词</span><div class="dim-bar"><div class="dim-fill" style="width:68%;background:var(--color-warning-500)"></div></div><span class="dim-val">68</span></div>
    </div>
  </div>
</div>
</body>
</html>

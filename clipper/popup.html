<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Inter", sans-serif; width: 340px; background: #F8F9FB; color: #111827; font-size: 13px; }

  .header { background: #6366F1; color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 8px; }
  .header-title { font-weight: 700; font-size: 14px; }
  .header-sub { font-size: 11px; opacity: 0.8; margin-top: 1px; }

  .body { padding: 14px 16px; }

  .status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
  .status.loading { background: #EEF2FF; color: #4338CA; }
  .status.error   { background: #FEF2F2; color: #DC2626; }
  .status.success { background: #ECFDF5; color: #065F46; }

  .spinner { width: 14px; height: 14px; border: 2px solid #C7D2FE; border-top-color: #6366F1; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: #6B7280; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select { width: 100%; padding: 6px 9px; border: 1px solid #E5E7EB; border-radius: 7px; font-size: 12.5px; color: #111827; background: #fff; outline: none; font-family: inherit; }
  .field input:focus, .field select:focus { border-color: #6366F1; }

  .skills { display: flex; flex-wrap: wrap; gap: 4px; }
  .skill-tag { background: #EEF2FF; color: #4338CA; border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 500; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .btn { width: 100%; padding: 9px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 4px; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #6366F1; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #4F46E5; }
  .btn-outline { background: #fff; color: #374151; border: 1px solid #E5E7EB; }

  .divider { border: none; border-top: 1px solid #E5E7EB; margin: 12px 0; }

  .url-row { display: flex; gap: 6px; align-items: center; }
  .url-row input { flex: 1; }

  #preview { display: none; }
  #actions { display: none; }
</style>
</head>
<body>
<div class="header">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <div>
    <div class="header-title">InternPilot Clipper</div>
    <div class="header-sub">一键保存岗位</div>
  </div>
</div>

<div class="body">
  <div id="status" class="status loading">
    <div class="spinner"></div>
    <span id="status-text">正在读取页面并识别岗位信息…</span>
  </div>

  <div id="preview">
    <div class="row">
      <div class="field">
        <label>公司</label>
        <input id="f-company" placeholder="未识别" />
      </div>
      <div class="field">
        <label>岗位名称</label>
        <input id="f-title" placeholder="未识别" />
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>地点</label>
        <input id="f-location" placeholder="未识别" />
      </div>
      <div class="field">
        <label>方向</label>
        <select id="f-role">
          <option>数据分析</option>
          <option>AI产品</option>
          <option>产品经理</option>
          <option>用户研究</option>
          <option>其他</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>技能关键词</label>
      <div id="f-skills" class="skills"></div>
    </div>
    <div class="field">
      <label>招聘原链接</label>
      <input id="f-url" placeholder="当前页面链接" />
    </div>
    <hr class="divider">
  </div>

  <div id="actions">
    <button class="btn btn-primary" id="btn-save">保存到 InternPilot</button>
    <button class="btn btn-outline" id="btn-retry" style="margin-top:6px">重新识别</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
